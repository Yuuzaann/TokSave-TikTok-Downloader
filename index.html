<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>TokSave - TikTok Downloader</title>

    <link rel="icon" href="favicon.png" />

    <!-- GOOGLE FONT -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- BOOTSTRAP -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- BOOTSTRAP ICON -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <!-- BOXICONS -->
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />

    <!-- TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- ANIMATE -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="main-container">
      <div class="card-downloader animate__animated animate__fadeInUp">
        <div class="header">
          <div class="logo-box">
            <i class="bi bi-tiktok"></i>
          </div>

          <h1>TokSave</h1>

          <p>Download video, MP3 dan slideshow tanpa watermark</p>
        </div>

        <div class="input-area">
          <input
            id="url"
            type="text"
            placeholder="Paste link TikTok disini..."
          />

          <button id="fetchBtn">
            <i class="bx bx-search"></i>
          </button>

          <button id="clearBtn">
            <i class="bx bx-x"></i>
          </button>
        </div>

        <div id="loading" class="loading hidden">
          <div class="spinner-border text-danger"></div>
          <p>Mengambil data...</p>
        </div>

        <div id="result" class="result hidden">
          <h4 id="title" class="video-title"></h4>

          <div id="hashtags" class="hashtags"></div>

          <video id="video" controls></video>

          <div id="photoGallery" class="photo-gallery"></div>

          <div class="download-buttons">
            <button id="downloadVideo">
              <i class="bx bx-download"></i>
              Video
            </button>

            <button id="downloadMP3">
              <i class="bx bx-music"></i>
              MP3
            </button>
          </div>
        </div>
      </div>

      <footer>
        <p>
          © 2026 Copyright by
          <a href="https://github.com/Yuuzaann">Yuuzaann</a>
        </p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
