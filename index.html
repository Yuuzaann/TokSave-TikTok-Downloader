<!doctype html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

<meta name="theme-color" content="#0f172a">

<title>TokSave - TikTok Downloader</title>

<link rel="icon" type="image/png" href="favicon.png">

<link rel="preconnect" href="https://www.tikwm.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app-wrapper">

<div class="downloader-card">

<div class="header">

<i class="bi bi-tiktok logo"></i>

<h1>TokSave</h1>

<p>Download video, MP3, slideshow tanpa watermark</p>

</div>


<div class="input-area">

<input id="url"
type="url"
placeholder="Paste link TikTok..."
autocomplete="url">

<button id="fetchBtn">
<i class="bi bi-search"></i>
</button>

<button id="clearBtn">
<i class="bi bi-x-lg"></i>
</button>

</div>


<div id="loading" class="loading hidden">

<div class="spinner-border text-danger"></div>

<p>Mengambil data...</p>

</div>


<div id="result" class="result hidden">

<h4 id="title"></h4>

<video id="video" controls playsinline></video>

<div id="photoGallery" class="photo-gallery"></div>

<div class="download-buttons">

<button id="downloadVideo">
<i class="bi bi-download"></i> Video
</button>

<button id="downloadMP3">
<i class="bi bi-music-note"></i> MP3
</button>

</div>

</div>

</div>


<footer class="footer">

<p>
© 2026
<a href="https://github.com/Yuuzaann" target="_blank">Yuuzaann</a>
</p>

</footer>

</div>

<script src="script.js"></script>

</body>
</html>
